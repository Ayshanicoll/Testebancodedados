<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Enquete</title>
</head>
<body>
    <h1>Você está bem?</h1>
    <button onclick="enviarVoto('sim')">Sim</button>
    <button onclick="enviarVoto('nao')">Não</button>
    <div id="status"></div>

    <script>
        async function enviarVoto(respostaEscolhida) {
            const status = document.getElementById('status');
            status.innerText = "Computando voto...";
            
            try {
                // SUBSTITUA ABAIXO PELA URL DO SEU BACKEND QUANDO COLOCAR ELE ONLINE (Ex: Render)
                // Enquanto testa localmente ou não tem a URL, pode usar 'http://localhost:3000/votar'
                const URL_BACKEND = 'https://sua-api-no-render.onrender.com/votar'; 

                const res = await fetch(URL_BACKEND, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ resposta: respostaEscolhida })
                });
                
                const data = await res.json();
                status.innerText = res.ok ? "Voto computado!" : data.erro;
            } catch (e) {
                status.innerText = "Erro ao conectar ao servidor.";
            }
        }
    </script>
</body>
</html>
