<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Enquete</title>
</head>
<body>
    <h1>Você está bem?</h1>
    <button onclick="enviarVoto('sim')">Sim</button>
    <button onclick="enviarVoto('nao')">Não</button>
    <div id="status"></div>

    <script>
        async function enviarVoto(respostaEscolhida) {
            const status = document.getElementById('status');
            status.innerText = "Enviando...";
            
            try {
                // IMPORTANTE: Aqui vai a URL do seu SERVIDOR BACKEND, e não do banco.
                // Se o HTML e o Server estiverem no mesmo lugar, basta '/votar'
                const res = await fetch('https://SUA-URL-DO-BACKEND.railway.app/votar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ resposta: respostaEscolhida })
                });
                
                const data = await res.json();
                status.innerText = res.ok ? "Voto computado!" : data.erro;
            } catch (e) {
                status.innerText = "Erro ao conectar ao servidor.";
            }
        }
    </script>
</body>
</html>
