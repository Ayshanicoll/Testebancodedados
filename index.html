<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Enquete</title>
</head>
<body>
    <h1>Você está bem?</h1>
    <button onclick="enviarVoto('sim')">Sim</button>
    <button onclick="enviarVoto('nao')">Não</button>
    <div id="status"></div>

    <script>
        async function enviarVoto(respostaEscolhida) {
            const status = document.getElementById('status');
            status.innerText = "Enviando voto...";
            try {
                // Aqui vai a URL de onde o seu server.js estará rodando
                // Para testar no seu PC, use 'http://localhost:3000/votar'
                const res = await fetch('http://localhost:3000/votar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ resposta: respostaEscolhida })
                });
                const data = await res.json();
                status.innerText = res.ok ? "Voto computado!" : data.erro;
            } catch (e) {
                status.innerText = "Erro ao conectar ao servidor.";
            }
        }
    </script>
</body>
</html>
