<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Enquete</title>
</head>
<body>
    <h1>Você está bem?</h1>
    <button onclick="enviarVoto('sim')">Sim</button>
    <button onclick="enviarVoto('nao')">Não</button>
    <div id="status"></div>

    <script>
        async function enviarVoto(respostaEscolhida) {
            const status = document.getElementById('status');
            try {
                const res = await fetch('postgresql://enquete_user:xkpEcHwB9cIqBymLshSI3zehv1mlfEU5@dpg-d86f1e6k1jcs73d0l7r0-a.virginia-postgres.render.com/enquete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ resposta: respostaEscolhida })
                });
                const data = await res.json();
                status.innerText = res.ok ? "Voto computado!" : data.erro;
            } catch (e) {
                status.innerText = "Erro ao conectar.";
            }
        }
    </script>
</body>
</html>
